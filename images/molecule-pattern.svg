<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="moleculePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#10b981" opacity="0.3"/>
      <circle cx="50" cy="30" r="2" fill="#10b981" opacity="0.3"/>
      <circle cx="90" cy="10" r="2" fill="#10b981" opacity="0.3"/>
      <circle cx="30" cy="70" r="2" fill="#10b981" opacity="0.3"/>
      <circle cx="70" cy="90" r="2" fill="#10b981" opacity="0.3"/>
      <line x1="10" y1="10" x2="50" y2="30" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>
      <line x1="50" y1="30" x2="90" y2="10" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>
      <line x1="10" y1="10" x2="30" y2="70" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>
      <line x1="30" y1="70" x2="70" y2="90" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#moleculePattern)"/>
</svg>
