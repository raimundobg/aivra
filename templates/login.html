<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BiteTrack</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Design System -->
    <link rel="stylesheet" href="/css/bitetrack-design-system.css">
</head>

<body class="bt-landing">
    <!-- Background Blobs -->
    <div class="bt-background-blobs">
        <div class="bt-blob bt-blob-1"></div>
        <div class="bt-blob bt-blob-2"></div>
        <div class="bt-blob bt-blob-3"></div>
    </div>

    <!-- Top Bar -->
    <div class="bt-landing-topbar">
        <a href="{{ url_for('index') }}" class="bt-landing-topbar-logo">
            <div class="bt-topnav-logo">
                <i class="fas fa-heartbeat"></i>
            </div>
            <span class="bt-topnav-brand">BiteTrack</span>
        </a>
        <a href="{{ url_for('index') }}"
            style="color: var(--bt-fg-muted); text-decoration: none; font-size: 0.875rem; display: flex; align-items: center; gap: 0.375rem;">
            <i class="fas fa-arrow-left"></i>
            <span class="d-none d-sm-inline">Volver al inicio</span>
        </a>
    </div>

    <!-- Login Card -->
    <div class="bt-landing-container">
        <div class="bt-auth-card">
            <div class="bt-auth-logo">
                <i class="fas fa-heartbeat"></i>
            </div>
            <h1 class="bt-auth-title">Iniciar Sesión</h1>
            <p class="bt-auth-subtitle">Bienvenido/a de vuelta a BiteTrack</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}"
                style="border-radius: var(--bt-radius-lg); border:none; font-size:0.875rem; margin-bottom:1.25rem;">
                <i
                    class="fas fa-{% if category == 'success' %}check-circle{% elif category == 'danger' %}exclamation-circle{% else %}info-circle{% endif %} me-2"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div style="margin-bottom: 1.25rem;">
                    <label class="form-label"
                        style="font-weight:600; font-size:0.85rem; color:var(--bt-fg-default); margin-bottom:0.375rem; display:block;">
                        <i class="fas fa-envelope me-1"></i>
                        Email
                    </label>
                    <input type="email" name="email" placeholder="tu@email.com" required autofocus
                        style="width:100%; padding:0.75rem 1rem; border:1.5px solid var(--bt-border-default); border-radius:var(--bt-radius-md); font-size:0.9rem; font-family:var(--bt-font-body); transition:all 0.15s; background:var(--bt-bg-surface-solid); color:var(--bt-fg-default);"
                        onfocus="this.style.borderColor='var(--bt-brand-primary)';this.style.boxShadow='0 0 0 3px rgba(16,185,129,0.1)'"
                        onblur="this.style.borderColor='var(--bt-border-default)';this.style.boxShadow='none'">
                </div>

                <div style="margin-bottom: 1.25rem;">
                    <label class="form-label"
                        style="font-weight:600; font-size:0.85rem; color:var(--bt-fg-default); margin-bottom:0.375rem; display:block;">
                        <i class="fas fa-lock me-1"></i>
                        Contraseña
                    </label>
                    <div style="position: relative;">
                        <input type="password" name="password" id="passwordInput" placeholder="••••••••" required
                            style="width:100%; padding:0.75rem 2.5rem 0.75rem 1rem; border:1.5px solid var(--bt-border-default); border-radius:var(--bt-radius-md); font-size:0.9rem; font-family:var(--bt-font-body); transition:all 0.15s; background:var(--bt-bg-surface-solid); color:var(--bt-fg-default);"
                            onfocus="this.style.borderColor='var(--bt-brand-primary)';this.style.boxShadow='0 0 0 3px rgba(16,185,129,0.1)'"
                            onblur="this.style.borderColor='var(--bt-border-default)';this.style.boxShadow='none'">
                        <i class="fas fa-eye" id="togglePassword"
                            style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--bt-fg-muted);"
                            onclick="togglePasswordVisibility()"></i>
                    </div>
                </div>

                <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:1.5rem;">
                    <input type="checkbox" name="remember" id="remember"
                        style="width:18px;height:18px;cursor:pointer;accent-color:var(--bt-brand-primary);">
                    <label for="remember"
                        style="margin:0; cursor:pointer; color:var(--bt-fg-muted); font-size:0.875rem;">
                        Mantenerme conectado
                    </label>
                </div>

                <button type="submit" class="bt-auth-submit">
                    <i class="fas fa-sign-in-alt"></i>
                    Iniciar Sesión
                </button>
            </form>

            <div class="bt-auth-divider">
                <p>¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" class="bt-auth-link">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('passwordInput');
            const toggleIcon = document.getElementById('togglePassword');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
